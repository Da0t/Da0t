name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:        # Lets you run it manually from the Actions tab
  push:
    paths:
      - ".github/workflows/readme-stats.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # IMPORTANT: your PAT goes on checkout so the commit can be pushed
      # to your profile repo (profile repos block normal bot pushes).
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_1 }}

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Da0t&show_icons=true&hide_border=true&include_all_commits=true&bg_color=0d1117&title_color=B20000&icon_color=B20000&text_color=ffffff&ring_color=B20000
          path: profile/stats.svg
          token: ${{ secrets.PAT_1 }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Da0t&layout=compact&hide_border=true&langs_count=8&bg_color=0d1117&title_color=B20000&text_color=ffffff&hide=jupyter%20notebook
          path: profile/top-langs.svg
          token: ${{ secrets.PAT_1 }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats cards" || exit 0
          git push
